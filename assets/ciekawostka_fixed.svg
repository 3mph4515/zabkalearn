<svg width="900" height="520" viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="14" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="520" fill="#E8F5E9"/>
  
  <!-- Card -->
  <rect x="60" y="45" width="780" height="430" rx="22" fill="white" filter="url(#shadow)"/>
  
  <!-- Header: Frog avatar -->
  <g transform="translate(90, 70)">
    <circle cx="22" cy="22" r="22" fill="#4CAF50"/>
    <ellipse cx="22" cy="24" rx="13" ry="10" fill="#81C784"/>
    <circle cx="16" cy="18" r="4" fill="white"/>
    <circle cx="28" cy="18" r="4" fill="white"/>
    <circle cx="17" cy="19" r="2" fill="#1A1A1A"/>
    <circle cx="29" cy="19" r="2" fill="#1A1A1A"/>
    <path d="M16 28 Q22 33 28 28" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Header: Text -->
  <text x="150" y="85" font-family="Poppins, system-ui" font-size="22" font-weight="700" fill="#111">Żabka Learn</text>
  <text x="150" y="107" font-family="Inter, system-ui" font-size="14" fill="#666">Польский изнутри</text>
  
  <!-- Divider -->
  <line x1="90" y1="135" x2="810" y2="135" stroke="#EEEEEE"/>
  
  <!-- Badge -->
  <rect x="90" y="150" width="190" height="38" rx="19" fill="#E53935"/>
  <text x="185" y="175" text-anchor="middle" font-family="Inter, system-ui" font-size="15" font-weight="600" fill="white">🐸 CIEKAWOSTKA DNIA</text>
  
  <!-- Main word -->
  <text x="450" y="300" text-anchor="middle" font-family="Poppins, system-ui" font-size="56" font-weight="700" fill="#2E7D32">Zmierzchnica trupia główka</text>
  
  <!-- Question -->
  <text x="450" y="350" text-anchor="middle" font-family="Inter, system-ui" font-size="24" font-weight="500" fill="#222">Jak myślicie, co to jest? 🤔</text>
  
  <!-- Footer brand -->
  <text x="450" y="415" text-anchor="middle" font-family="Poppins, system-ui" font-size="18" font-weight="600" fill="#4CAF50">🐸 Żabka Learn</text>
</svg>